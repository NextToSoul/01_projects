# 星云 PPCU RS422 — 枚举定义
# 用于遥测参数 enum 类型的值解释
enums:
  mode_word:
    0x0: 待机模式
    0x1: 点火模式
    0x2: 稳态工作模式
    0x3: 关机模式
    0x4: 故障模式
    0xF: 自检模式

  sub_mode_word:
    0x0: 待机
    0x1: 阴极加热
    0x2: 阴极点火
    0x3: 阳极点火
    0x4: 稳态
    0x5: 除气
    0x6: 冲洗

  fault_type:
    0x01: 电流异常1
    0x02: 电流异常2
    0x04: 压力异常1
    0x08: 压力异常2
    0x10: 温度异常
    0x20: 点火超时
